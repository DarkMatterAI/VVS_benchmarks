  - name: final2
    params:
      batch_size          : [128]
      replay_batch_size   : [256]
      rand_act_prob       : [0.1]
      act_subsample_ratio : [0.02]
      warmup_percent      : [0.02]
    score_params:
      - score_name       : docking_2zdt
        timeout          : 30
        score_batch_size : 1
        concurrency      : 64
        device           : cpu
      - score_name       : synthemol_rf
        timeout          : 30
        score_batch_size : 1
        concurrency      : 64
        device           : cpu
      - score_name       : rocs_2chw
        timeout          : 30
        score_batch_size : 1
        concurrency      : 64
        device           : cpu
    run_params:
      inference_budget : 50000 
      runtime_limit    : 43200
      replicas         : 5






