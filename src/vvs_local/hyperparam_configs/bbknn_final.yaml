  - name: bbknn_final2
    params: 
      vvs_batch_size  : [16]
      iterations      : [4]
      exploit_percent : [0.5]
      k_nn            : [5]
      update_type     : [top1]
      lrs             :
        - [0, 1000, 2000, 3000, 4000, 5000, 6000]
    scorers:
      - plugin           : docking_2zdt
        timeout          : 30
        score_batch_size : 1
        concurrency      : 64
        device           : cpu
      - plugin           : synthemol_rf
        timeout          : 30
        score_batch_size : 1
        concurrency      : 64
        device           : cpu
      - plugin           : rocs_2chw
        timeout          : 30
        score_batch_size : 1
        concurrency      : 64
        device           : cpu
    run_params:
      inference_budget: 50000
      runtime_limit: 43200
      replicas: 5



