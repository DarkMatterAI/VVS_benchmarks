engine_params:
  engine: bbknn
  embedding:
    input_size: 256
    output_size: 256
  reaction_pool:
    num_proc     : 48
    cache_size   : 1000000
    refresh_every: 100000
runs:
  - name: bbknn_top1_sweep1
    params: 
      vvs_batch_size  : [8, 16, 32]
      iterations      : [2, 4, 6]
      exploit_percent : [0.0, 0.25, 0.5]
      k_nn            : [3, 5, 7]
      update_type     : [top1]
      lrs             :
        - [0, 1000, 2000, 3000, 4000, 5000, 6000]
        - [0, 10, 100, 1000]
        - [0, 2500, 5000, 7500, 10000]
    scorers:
      - plugin           : erbb1_mlp
        timeout          : 30
        score_batch_size : 1024
        concurrency      : 6
        device           : gpu
    run_params:
      inference_budget: 50000
      runtime_limit: 43200
      replicas: 3
